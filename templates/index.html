<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <title>StockAI Pro - 日本株分析</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="fade-in">
  <div id="appSplash" class="app-splash" aria-hidden="true">
    <img src="/static/icons/icon-192.svg" alt="" width="88" height="88">
    <h1 class="splash-title">StockAI <span class="logo-pro">Pro</span></h1>
    <p class="splash-sub">日本株分析</p>
  </div>

  <div class="global-progress" id="globalProgress" aria-hidden="true"><div class="global-progress-bar"></div></div>

  <!-- ヘッダー -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="logo-icon">📈</span>
        <span class="logo-text">StockAI <span class="logo-pro">Pro</span></span>
      </div>
      <div class="header-right">
        <button type="button" class="icon-btn notif-btn" id="notifToggle" title="通知">
          <span class="notif-icon">🔔</span>
          <span class="notif-badge" id="notifBadge">0</span>
        </button>
        <button type="button" class="icon-btn" id="themeToggle" title="テーマ">⚙️</button>
      </div>
    </div>
    <div class="alert-settings-bar">
      <label class="alert-toggle-label">
        <input type="checkbox" id="alertToggle"> 価格通知
      </label>
      <label class="alert-threshold-label">
        閾値 <input type="number" id="alertThreshold" min="0.5" max="20" step="0.5" value="3" class="alert-threshold-input"> %
      </label>
    </div>
  </header>

  <!-- 通知パネル -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <span>🔔 通知センター</span>
      <button type="button" class="notif-close" id="notifClose" aria-label="閉じる">✕</button>
    </div>
    <div class="notif-list" id="notifList">
      <div class="loading-spin">読み込み中...</div>
    </div>
  </div>
  <div class="notif-overlay" id="notifOverlay"></div>

  <!-- 検索セクション -->
  <section class="search-section">
    <div class="search-wrap">
      <div class="search-box-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="銘柄コード・名称 例: 7203" maxlength="20" autocomplete="off">
          <button type="button" class="search-btn" id="searchBtn">検索</button>
        </div>
        <div class="search-suggest" id="searchSuggest"></div>
        <div class="search-history" id="searchHistory"></div>
      </div>
      <div class="quick-symbols">
        <span class="qs-label">人気：</span>
        <button type="button" class="qs-chip" data-symbol="7203">7203</button>
        <button type="button" class="qs-chip" data-symbol="8035">8035</button>
        <button type="button" class="qs-chip" data-symbol="9984">9984</button>
        <button type="button" class="qs-chip" data-symbol="6758">6758</button>
        <button type="button" class="qs-chip" data-symbol="4063">4063</button>
      </div>
    </div>
  </section>

  <!-- 市場指数バー -->
  <div class="market-bar" id="marketBar">
    <div class="market-bar-row">
      <div class="market-ticker" id="marketTicker">
        <span class="mt-loading">市場データ読み込み中...</span>
      </div>
      <span class="live-sync" id="liveSyncStatus" aria-live="polite"></span>
    </div>
  </div>

  <!-- メインタブ（PC用） -->
  <nav class="main-tabs">
    <button type="button" class="tab-btn active" data-tab="home">ホーム</button>
    <button type="button" class="tab-btn" data-tab="watchlist">登録銘柄</button>
    <button type="button" class="tab-btn" data-tab="ranking">急騰・急落</button>
  </nav>

  <div id="mainTabArea">
  <!-- ホームタブ -->
  <div class="tab-content active" id="tab-home">
    <div class="section-title">📊 今日の市場テーマ</div>
    <div class="market-themes" id="marketThemes">
      <div class="skeleton-cards"></div>
    </div>

    <div class="section-title">🔎 銘柄発掘メニュー</div>
    <div class="home-menu-grid">
      <button type="button" class="home-menu-card" data-panel="buried">
        <span class="home-menu-icon">💎</span>
        <span class="home-menu-label">埋もれ株発掘</span>
        <span class="home-menu-desc">AIスコアで有望株</span>
      </button>
      <button type="button" class="home-menu-card" data-panel="fund">
        <span class="home-menu-icon">🏦</span>
        <span class="home-menu-label">ファンド狙い</span>
        <span class="home-menu-desc">機関投資家の視点</span>
      </button>
      <button type="button" class="home-menu-card" data-panel="market">
        <span class="home-menu-icon">🌐</span>
        <span class="home-menu-label">市場AI分析</span>
        <span class="home-menu-desc">指数・テーマ総合</span>
      </button>
    </div>

    <div class="section-title">🤖 市場AI要約</div>
    <div class="ai-summary-card" id="aiSummaryCard">
      <div class="skeleton-block skeleton-lg"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line skeleton-sm"></div>
    </div>
  </div>
  </div>

  <!-- サブ画面（発掘・ファンド・市場AI）動的生成 -->
  <div id="subPanelHost" class="sub-panel-host"></div>

  <!-- フォルダ作成・名前変更モーダル -->
  <div class="modal-overlay" id="folderModal" style="display: none;">
    <div class="modal-box">
      <div class="modal-title" id="folderModalTitle">フォルダを作成</div>
      <input type="text" id="folderNameInput" placeholder="例: 半導体 / 商社 / 監視中" maxlength="30" class="modal-input">
      <div class="modal-btns">
        <button type="button" class="modal-cancel" id="folderModalCancel">キャンセル</button>
        <button type="button" class="modal-ok" id="folderModalOk">保存</button>
      </div>
    </div>
  </div>

  <!-- 銘柄追加モーダル -->
  <div class="modal-overlay" id="watchModal" style="display: none;">
    <div class="modal-box">
      <div class="modal-title">銘柄を追加</div>
      <label class="modal-label" for="watchFolderSelect">フォルダ</label>
      <select id="watchFolderSelect" class="modal-select"></select>
      <label class="modal-label" for="watchInput">銘柄コード</label>
      <input type="text" id="watchInput" placeholder="4桁コード（例: 7203）" maxlength="4" inputmode="numeric" class="modal-input">
      <div class="modal-btns">
        <button type="button" class="modal-cancel" id="watchModalCancel">キャンセル</button>
        <button type="button" class="modal-ok" id="watchModalOk">追加</button>
      </div>
    </div>
  </div>

  <!-- ボトムナビ（ホーム / 登録銘柄 / 急騰急落） -->
  <nav class="bottom-nav bottom-nav-minimal bottom-nav-triple">
    <a href="/" class="bn-item active" data-tab-nav="home">
      <span class="bn-icon">🏠</span>
      <span class="bn-label">ホーム</span>
    </a>
    <a href="#" class="bn-item bn-item-center" data-tab-nav="watchlist">
      <span class="bn-icon">📋</span>
      <span class="bn-label">登録銘柄</span>
      <span class="bn-badge" id="watchlistBadge" hidden>0</span>
    </a>
    <a href="#" class="bn-item" data-tab-nav="ranking">
      <span class="bn-icon">📊</span>
      <span class="bn-label">急騰急落</span>
    </a>
  </nav>

  <script src="/static/watchlist.js"></script>
  <script src="/static/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initIndex();
    });

    const tabLoaded = { home: false, watchlist: false, ranking: false };
    const tabLoading = { home: false, watchlist: false, ranking: false };
    const panelLoaded = { buried: false, fund: false, market: false };
    const panelLoading = { buried: false, fund: false, market: false };
    let notifLoaded = false;
    let currentMainTab = 'home';
    let activeSubPanel = null;

    const SUB_PANEL_META = {
      buried: {
        title: '埋もれ株発掘',
        icon: '💎',
        desc: 'AIがまだ市場に知られていない有望銘柄を独自スコアで発掘',
        bodyClass: 'buried-list',
        listId: 'buriedList',
      },
      fund: {
        title: 'ファンド先回り',
        icon: '🏦',
        desc: 'ファンド・アクティビストが好む条件の銘柄を先回り発掘',
        bodyClass: 'fund-list',
        listId: 'fundList',
      },
      market: {
        title: '市場AI分析',
        icon: '🌐',
        desc: '指数・テーマ・AI要約をまとめて確認',
        bodyClass: 'market-ai-content',
        listId: 'marketAiContent',
      },
    };

    function skeletonCards(n) {
      return Array.from({ length: n }, () => '<div class="skeleton-card-row"></div>').join('');
    }

    function skeletonRankList() {
      return skeletonCards(5);
    }

    function updatedLabel(data) {
      if (!data || !data.updated) return '';
      return `更新 ${data.updated}`;
    }

    function initIndex() {
      const input = document.getElementById('searchInput');
      const btn = document.getElementById('searchBtn');

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSearch();
      });
      btn.addEventListener('click', doSearch);

      document.querySelectorAll('.qs-chip').forEach((chip) => {
        chip.addEventListener('click', () => goToStock(chip.dataset.symbol));
      });

      document.querySelectorAll('.tab-btn').forEach((tabBtn) => {
        tabBtn.addEventListener('click', () => switchTab(tabBtn.dataset.tab));
      });

      document.querySelectorAll('.bn-item[data-tab-nav]').forEach((item) => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          switchTab(item.dataset.tabNav);
        });
      });

      document.querySelectorAll('.home-menu-card[data-panel]').forEach((card) => {
        card.addEventListener('click', () => openSubPanel(card.dataset.panel));
      });

      document.getElementById('notifToggle').addEventListener('click', toggleNotifPanel);
      document.getElementById('notifClose').addEventListener('click', closeNotifPanel);
      document.getElementById('notifOverlay').addEventListener('click', closeNotifPanel);

      document.getElementById('watchModalCancel').addEventListener('click', () => WatchlistUI.closeSymbolModal());
      document.getElementById('watchModalOk').addEventListener('click', () => WatchlistUI.addSymbolFromModal());
      document.getElementById('folderModalCancel').addEventListener('click', () => WatchlistUI.closeFolderModal());
      document.getElementById('folderModalOk').addEventListener('click', () => WatchlistUI.saveFolderModal());

      WatchlistUI.init();
      loadMarketIndices();
      updateWatchlistBadge();
      setupHomeLazyLoad();
      initIndexAutoRefresh();
    }

    function initIndexAutoRefresh() {
      if (!window.createPageAutoRefresh) return;
      const autoRefresh = createPageAutoRefresh({
        intervalMs: 30000,
        onRefresh: () => refreshIndexPage(),
      });
      autoRefresh.start();
      window._indexAutoRefresh = autoRefresh;
    }

    async function refreshIndexPage() {
      if (document.hidden) return;
      setLiveSyncStatus('liveSyncStatus', '更新中…', true);

      const tasks = [loadMarketIndices({ silent: true })];

      if (currentMainTab === 'home' && tabLoaded.home) {
        tasks.push(loadHomeContent({ silent: true }));
      } else if (currentMainTab === 'ranking' && tabLoaded.ranking) {
        tasks.push(loadRanking({ silent: true }));
      } else if (currentMainTab === 'watchlist' && tabLoaded.watchlist) {
        tasks.push(WatchlistUI.refresh({ silent: true }));
      }

      tasks.push(loadNotifications({ silent: true }));

      await Promise.allSettled(tasks);
      setLiveSyncStatus('liveSyncStatus', formatLiveTime());
    }

    function setupHomeLazyLoad() {
      const themesEl = document.getElementById('marketThemes');
      if (!themesEl || !('IntersectionObserver' in window)) return;
      const io = new IntersectionObserver((entries) => {
        if (entries.some((e) => e.isIntersecting)) {
          ensureTabData('home');
          io.disconnect();
        }
      }, { rootMargin: '80px' });
      io.observe(themesEl);
    }

    function ensureTabData(name) {
      if (tabLoaded[name] || tabLoading[name]) return;
      tabLoading[name] = true;
      const done = () => { tabLoading[name] = false; tabLoaded[name] = true; };
      if (name === 'home') {
        loadHomeContent().finally(done);
      } else if (name === 'watchlist') {
        loadWatchlistContent().finally(done);
      } else if (name === 'ranking') {
        loadRanking().finally(done);
      } else {
        tabLoading[name] = false;
      }
    }

    function ensureWatchlistTabDom() {
      if (document.getElementById('tab-watchlist')) return;
      const area = document.getElementById('mainTabArea');
      const tab = document.createElement('div');
      tab.className = 'tab-content';
      tab.id = 'tab-watchlist';
      tab.innerHTML =
        '<div class="watch-page-header section-header">' +
        '<div class="section-title">📋 登録銘柄</div>' +
        '<div class="wf-header-actions">' +
        '<button type="button" class="add-watch-btn" id="addFolderBtn">＋ フォルダ</button>' +
        '<button type="button" class="add-watch-btn" id="addWatchBtnTab">＋ 銘柄</button>' +
        '</div></div>' +
        '<p class="watch-page-desc">テーマ別・目的別にフォルダで整理（SBI登録銘柄風）</p>' +
        '<div class="watch-folder-list" id="watchFolderList">' +
        '<div class="skeleton-list">' + skeletonCards(2) + '</div></div>';

      area.appendChild(tab);

      document.getElementById('addFolderBtn').addEventListener('click', () => WatchlistUI.openFolderModal());
      document.getElementById('addWatchBtnTab').addEventListener('click', () => WatchlistUI.openSymbolModal());
    }

    function destroyWatchlistTab() {
      const tab = document.getElementById('tab-watchlist');
      if (tab) tab.remove();
      WatchlistUI.destroy();
      tabLoaded.watchlist = false;
      tabLoading.watchlist = false;
    }

    function loadWatchlistContent(opts = {}) {
      if (!document.getElementById('tab-watchlist')) return Promise.resolve();
      if (!WatchlistUI.mounted) WatchlistUI.mountTab();
      return WatchlistUI.refresh(opts);
    }

    function ensureRankingTabDom() {
      if (document.getElementById('tab-ranking')) return;
      const area = document.getElementById('mainTabArea');
      const tab = document.createElement('div');
      tab.className = 'tab-content';
      tab.id = 'tab-ranking';
      tab.innerHTML =
        '<div class="section-title">📈 本日の急騰銘柄</div>' +
        '<div class="ranking-list" id="gainersList"></div>' +
        '<div class="section-title mt-16">📉 本日の急落銘柄</div>' +
        '<div class="ranking-list" id="losersList"></div>';
      area.appendChild(tab);
    }

    function destroyRankingTab() {
      const tab = document.getElementById('tab-ranking');
      if (tab) tab.remove();
      tabLoaded.ranking = false;
      tabLoading.ranking = false;
    }

    function openSubPanel(name) {
      const meta = SUB_PANEL_META[name];
      if (!meta) return;

      closeSubPanel(false);
      activeSubPanel = name;
      panelLoaded[name] = false;
      panelLoading[name] = false;

      const host = document.getElementById('subPanelHost');
      host.classList.add('is-open');
      host.innerHTML =
        '<div class="sub-panel">' +
        '<div class="sub-panel-header">' +
        '<button type="button" class="sub-panel-back" id="subPanelBack">← ホーム</button>' +
        `<h2 class="sub-panel-title">${meta.icon} ${escapeHtml(meta.title)}</h2>` +
        '</div>' +
        `<p class="sub-panel-desc">${escapeHtml(meta.desc)}</p>` +
        `<div class="${meta.bodyClass} sub-panel-body" id="${meta.listId}">` +
        `<div class="skeleton-list">${skeletonCards(name === 'market' ? 4 : 3)}</div>` +
        '</div></div>';

      document.body.classList.add('sub-panel-open');
      document.getElementById('mainTabArea').classList.add('is-behind');
      document.getElementById('subPanelBack').addEventListener('click', closeSubPanel);
      window.scrollTo(0, 0);
      loadSubPanelData(name);
    }
    window.openSubPanel = openSubPanel;

    function closeSubPanel(resetNav) {
      const host = document.getElementById('subPanelHost');
      if (activeSubPanel) {
        panelLoaded[activeSubPanel] = false;
        panelLoading[activeSubPanel] = false;
        activeSubPanel = null;
      }
      host.innerHTML = '';
      host.classList.remove('is-open');
      document.body.classList.remove('sub-panel-open');
      document.getElementById('mainTabArea')?.classList.remove('is-behind');
      if (resetNav !== false) {
        switchTab('home', { fromSubPanel: true });
      }
    }
    window.closeSubPanel = closeSubPanel;

    function loadSubPanelData(name) {
      if (panelLoaded[name] || panelLoading[name]) return;
      panelLoading[name] = true;
      const done = () => { panelLoading[name] = false; panelLoaded[name] = true; };
      if (name === 'buried') loadBuried().finally(done);
      else if (name === 'fund') loadFund().finally(done);
      else if (name === 'market') loadMarketAi().finally(done);
      else panelLoading[name] = false;
    }

    function ensureNotifications() {
      if (notifLoaded) return;
      notifLoaded = true;
      loadNotifications();
    }

    function doSearch() {
      const val = document.getElementById('searchInput').value.trim();
      const code = val.match(/\d{4}/)?.[0] || val;
      if (/^\d{4}$/.test(code)) {
        saveSearchHistory(code);
        goToStock(code);
      } else {
        showToast('4桁の銘柄コードを入力してください');
      }
    }
    window.doSearch = doSearch;

    function goToStock(symbol) {
      window.location.href = `/stock/${symbol}`;
    }
    window.goToStock = goToStock;

    function switchTab(name, opts) {
      if (name !== 'home' && name !== 'watchlist' && name !== 'ranking') return;

      if (!opts?.fromSubPanel) {
        closeSubPanel(false);
      }

      if (currentMainTab === 'ranking' && name !== 'ranking') {
        destroyRankingTab();
      }
      if (currentMainTab === 'watchlist' && name !== 'watchlist') {
        destroyWatchlistTab();
      }

      if (name === 'ranking') {
        ensureRankingTabDom();
      }
      if (name === 'watchlist') {
        ensureWatchlistTabDom();
      }

      currentMainTab = name;

      document.querySelectorAll('.tab-btn').forEach((b) => {
        b.classList.toggle('active', b.dataset.tab === name);
      });
      document.querySelectorAll('#mainTabArea .tab-content').forEach((c) => {
        c.classList.toggle('active', c.id === `tab-${name}`);
      });
      document.querySelectorAll('.bn-item[data-tab-nav]').forEach((i) => {
        i.classList.toggle('active', i.dataset.tabNav === name);
      });
      ensureTabData(name);
      window.scrollTo(0, 0);
    }

    function updateWatchlistBadge() {
      const badge = document.getElementById('watchlistBadge');
      if (!badge) return;
      const count = WatchlistStore.getTotalSymbolCount();
      if (count > 0) {
        badge.textContent = count > 99 ? '99+' : String(count);
        badge.hidden = false;
      } else {
        badge.hidden = true;
      }
    }
    window.updateWatchlistBadge = updateWatchlistBadge;

    function chgClass(changeStr) {
      if (!changeStr || changeStr === 'N/A') return 'neutral';
      return String(changeStr).trim().startsWith('+') ? 'up' : 'down';
    }

    async function loadMarketIndices(opts = {}) {
      const silent = !!opts.silent;
      const ticker = document.getElementById('marketTicker');
      try {
        const res = silent ? await fetchSilent('/api/market_indices') : await fetch('/api/market_indices');
        const data = await res.json();
        if (data.status !== 'ok') throw new Error('failed');

        const meta = updatedLabel(data);
        ticker.innerHTML = data.indices.map((i) => `
          <span class="mt-item card-premium">
            <span class="mt-name">${escapeHtml(i.name)}</span>
            <span class="mt-val">${escapeHtml(i.value)}</span>
            <span class="mt-chg ${chgClass(i.change)}">${escapeHtml(i.change)}</span>
          </span>
        `).join('') + (meta ? `<span class="mt-updated">${escapeHtml(meta)}</span>` : '');
        if (!silent) setLiveSyncStatus('liveSyncStatus', formatLiveTime());
      } catch (e) {
        console.error(e);
        if (!silent) {
          ticker.innerHTML = '<span class="mt-loading">指数取得失敗 <button type="button" class="retry-btn" onclick="loadMarketIndices()">再試行</button></span>';
        }
      }
    }
    window.loadMarketIndices = loadMarketIndices;

    async function loadHomeContent(opts = {}) {
      const silent = !!opts.silent;
      const themesEl = document.getElementById('marketThemes');
      const aiCard = document.getElementById('aiSummaryCard');
      if (!silent) {
        themesEl.innerHTML = `<div class="skeleton-list">${skeletonCards(3)}</div>`;
        aiCard.innerHTML = '<div class="skeleton-block skeleton-lg"></div><div class="skeleton-line"></div><div class="skeleton-line skeleton-sm"></div>';
      }
      try {
        const res = silent ? await fetchSilent('/api/market_summary') : await fetch('/api/market_summary');
        const data = await res.json();
        if (data.status !== 'ok') throw new Error('failed');

        themesEl.innerHTML = `
          <div class="theme-grid">
            ${data.themes.map((t) => `
              <div class="theme-card card-premium ${escapeHtml(t.color)}${silent ? '' : ' fade-in'}">
                <div class="theme-name">${escapeHtml(t.name)}</div>
                <div class="theme-trend">${escapeHtml(t.trend)}</div>
                <div class="theme-reason">${escapeHtml(t.reason || t.detail)}</div>
                <div class="theme-related">
                  <span class="theme-rel-label">関連:</span>
                  ${(t.related || []).map((s) => `
                    <button type="button" class="theme-stock-chip" data-symbol="${escapeHtml(s)}">${escapeHtml(s)}</button>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        `;
        themesEl.querySelectorAll('.theme-stock-chip').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            goToStock(btn.dataset.symbol);
          });
        });

        aiCard.innerHTML = `
          <div class="ai-summary-header">
            🤖 市場AI要約
            <span class="ai-time">${escapeHtml(updatedLabel(data))}</span>
          </div>
          <div class="ai-summary-text">${escapeHtml(data.summary)}</div>
        `;
      } catch (e) {
        console.error(e);
        if (!silent) {
          themesEl.innerHTML = '<div class="load-fail">読み込み失敗 <button type="button" class="retry-btn" onclick="retryHomeContent()">再試行</button></div>';
        }
      }
    }

    function retryHomeContent() {
      tabLoaded.home = false;
      tabLoading.home = false;
      ensureTabData('home');
    }
    window.retryHomeContent = retryHomeContent;

    async function loadMarketAi() {
      const el = document.getElementById('marketAiContent');
      el.innerHTML = `<div class="skeleton-list">${skeletonCards(4)}</div>`;
      try {
        const res = await fetch('/api/market_summary');
        const data = await res.json();
        if (data.status !== 'ok') return;

        el.innerHTML = `
          <div class="market-ai-meta">${escapeHtml(updatedLabel(data))}</div>
          <div class="market-ai-indices">
            ${data.indices.map((i) => `
              <div class="market-ai-index">
                <div class="mai-name">${escapeHtml(i.name)}</div>
                <div class="mai-val">${escapeHtml(i.value)}</div>
                <div class="mai-chg ${chgClass(i.change)}">${escapeHtml(i.change)}</div>
              </div>
            `).join('')}
          </div>
          <div class="ai-summary-card">
            <div class="ai-summary-header">
              🤖 市場全体分析
              <span class="ai-time">${escapeHtml(updatedLabel(data))}</span>
            </div>
            <div class="ai-summary-text">${escapeHtml(data.summary)}</div>
          </div>
          <div class="theme-grid mt-16">
            ${data.themes.map((t) => `
              <div class="theme-card ${escapeHtml(t.color)}">
                <div class="theme-name">${escapeHtml(t.name)}</div>
                <div class="theme-trend">${escapeHtml(t.trend)}</div>
                <div class="theme-detail">${escapeHtml(t.detail)}</div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (e) {
        console.error(e);
        el.innerHTML = '<div class="load-fail">読み込み失敗 <button type="button" class="retry-btn" onclick="retryMarketAi()">再試行</button></div>';
      }
    }

    function retryMarketAi() {
      if (activeSubPanel === 'market') {
        panelLoaded.market = false;
        panelLoading.market = false;
        const el = document.getElementById('marketAiContent');
        if (el) el.innerHTML = `<div class="skeleton-list">${skeletonCards(4)}</div>`;
        loadSubPanelData('market');
      }
    }
    window.retryMarketAi = retryMarketAi;

    async function loadNotifications(opts = {}) {
      const silent = !!opts.silent;
      const panelOpen = document.getElementById('notifPanel')?.classList.contains('open');
      try {
        const res = silent ? await fetchSilent('/api/notifications') : await fetch('/api/notifications');
        const data = await res.json();
        if (data.status !== 'ok') return;

        document.getElementById('notifBadge').textContent = String(data.notifications.length);

        if (silent && !panelOpen) return;

        const list = document.getElementById('notifList');
        list.innerHTML = data.notifications.map((n) => {
          const typeClass = n.type.replace(/[^\w]/g, '');
          return `
            <div class="notif-item priority-${escapeHtml(n.priority)}" data-symbol="${escapeHtml(n.symbol)}">
              <div class="notif-item-top">
                <span class="notif-type-badge type-${escapeHtml(typeClass)}">${escapeHtml(n.type)}</span>
                <span class="notif-symbol">${escapeHtml(n.symbol)} ${escapeHtml(n.name)}</span>
                <span class="notif-time">${escapeHtml(n.time)}</span>
              </div>
              <div class="notif-msg">${escapeHtml(n.message)}</div>
            </div>
          `;
        }).join('');

        list.querySelectorAll('.notif-item').forEach((item) => {
          item.addEventListener('click', () => goToStock(item.dataset.symbol));
        });
      } catch (e) {
        console.error(e);
      }
    }

    async function loadRanking(opts = {}) {
      const silent = !!opts.silent;
      const gainersEl = document.getElementById('gainersList');
      const losersEl = document.getElementById('losersList');
      if (!gainersEl) return;
      if (!silent) {
        gainersEl.innerHTML = `<div class="skeleton-list">${skeletonRankList()}</div>`;
        losersEl.innerHTML = '';
      }
      try {
        const res = silent ? await fetchSilent('/api/ranking') : await fetch('/api/ranking');
        const data = await res.json();
        if (data.status !== 'ok') throw new Error('failed');

        const liveTag = data.live ? '<span class="live-badge">速報</span>' : '';
        const updated = data.updated ? `<span class="rank-updated">${escapeHtml(updatedLabel(data))}</span>` : '';

        gainersEl.innerHTML = (updated ? `<div class="rank-meta">${updated}${liveTag}</div>` : '') + data.gainers.map((s, i) => `
          <div class="rank-card card-premium" data-symbol="${escapeHtml(s.symbol)}">
            <span class="rank-num">${i + 1}</span>
            <div class="rank-info">
              <div class="rank-name">
                <span class="rank-symbol">${escapeHtml(s.symbol)}</span>
                <span class="rank-stock-name">${escapeHtml(s.name)}</span>
              </div>
              <div class="rank-reason">${escapeHtml(s.reason)} · 出来高 ${escapeHtml(s.volume)}</div>
            </div>
            <div class="rank-chg up">${escapeHtml(String(s.change_pct).replace('%', ''))}%</div>
          </div>
        `).join('');

        losersEl.innerHTML = data.losers.map((s, i) => `
          <div class="rank-card card-premium" data-symbol="${escapeHtml(s.symbol)}">
            <span class="rank-num">${i + 1}</span>
            <div class="rank-info">
              <div class="rank-name">
                <span class="rank-symbol">${escapeHtml(s.symbol)}</span>
                <span class="rank-stock-name">${escapeHtml(s.name)}</span>
              </div>
              <div class="rank-reason">${escapeHtml(s.reason)} · 出来高 ${escapeHtml(s.volume)}</div>
            </div>
            <div class="rank-chg down">${escapeHtml(String(s.change_pct).replace('%', ''))}%</div>
          </div>
        `).join('');

        document.querySelectorAll('.rank-card').forEach((card) => {
          card.addEventListener('click', () => goToStock(card.dataset.symbol));
        });
      } catch (e) {
        if (!silent) {
          gainersEl.innerHTML = '<div class="load-fail">読み込み失敗 <button type="button" class="retry-btn" onclick="retryRanking()">再試行</button></div>';
          losersEl.innerHTML = '';
        }
      }
    }

    function retryRanking() {
      tabLoaded.ranking = false;
      tabLoading.ranking = false;
      ensureTabData('ranking');
    }
    window.retryRanking = retryRanking;
    window.loadRanking = loadRanking;

    async function loadBuried() {
      const list = document.getElementById('buriedList');
      list.innerHTML = `<div class="skeleton-list">${skeletonCards(4)}</div>`;
      try {
        const res = await fetch('/api/buried');
        const data = await res.json();
        if (data.status !== 'ok') return;

        list.innerHTML = data.stocks.map((s) => `
          <div class="buried-card" data-symbol="${escapeHtml(s.symbol)}">
            <div class="buried-top">
              <div>
                <span class="buried-symbol">${escapeHtml(s.symbol)}</span>
                <span class="buried-name">${escapeHtml(s.name)}</span>
              </div>
              <div class="buried-score-wrap">
                <div class="buried-score-label">埋もれ度</div>
                <div class="buried-score">${s.buried_score}</div>
              </div>
            </div>
            <div class="buried-reason">${escapeHtml(s.reason)}</div>
            <div class="buried-bottom">
              <div class="buried-themes">
                ${s.themes.map((t) => `<span class="theme-tag">${escapeHtml(t)}</span>`).join('')}
              </div>
              <span class="buried-vol">${escapeHtml(s.vol_signal)}</span>
            </div>
          </div>
        `).join('');

        list.querySelectorAll('.buried-card').forEach((card) => {
          card.addEventListener('click', () => goToStock(card.dataset.symbol));
        });
      } catch (e) {
        console.error(e);
        list.innerHTML = '<div class="load-fail">読み込み失敗 <button type="button" class="retry-btn" onclick="retryBuried()">再試行</button></div>';
      }
    }

    function retryBuried() {
      if (activeSubPanel === 'buried') {
        panelLoaded.buried = false;
        panelLoading.buried = false;
        const el = document.getElementById('buriedList');
        if (el) el.innerHTML = `<div class="skeleton-list">${skeletonCards(4)}</div>`;
        loadSubPanelData('buried');
      }
    }
    window.retryBuried = retryBuried;

    async function loadFund() {
      const list = document.getElementById('fundList');
      list.innerHTML = `<div class="skeleton-list">${skeletonCards(3)}</div>`;
      try {
        const res = await fetch('/api/fund_screener');
        const data = await res.json();
        if (data.status !== 'ok') return;

        const meta = updatedLabel(data);
        list.innerHTML = (meta ? `<div class="fund-meta">${escapeHtml(meta)}</div>` : '') + data.stocks.map((s) => `
          <div class="fund-card" data-symbol="${escapeHtml(s.symbol)}">
            <div class="fund-top">
              <div>
                <span class="buried-symbol">${escapeHtml(s.symbol)}</span>
                <span class="buried-name">${escapeHtml(s.name)}</span>
              </div>
              <div class="fund-score-wrap">
                <div class="fund-score-label">注目度</div>
                <div class="fund-score">${s.score}</div>
              </div>
            </div>
            <div class="fund-type">${escapeHtml(s.fund_type)}</div>
            <div class="buried-reason">${escapeHtml(s.reason)}</div>
            <div class="fund-flags">
              ${s.flags.map((f) => `<span class="fund-flag">${escapeHtml(f)}</span>`).join('')}
            </div>
          </div>
        `).join('');

        list.querySelectorAll('.fund-card').forEach((card) => {
          card.addEventListener('click', () => goToStock(card.dataset.symbol));
        });
      } catch (e) {
        console.error(e);
        list.innerHTML = '<div class="load-fail">読み込み失敗 <button type="button" class="retry-btn" onclick="retryFund()">再試行</button></div>';
      }
    }

    function retryFund() {
      if (activeSubPanel === 'fund') {
        panelLoaded.fund = false;
        panelLoading.fund = false;
        const el = document.getElementById('fundList');
        if (el) el.innerHTML = `<div class="skeleton-list">${skeletonCards(3)}</div>`;
        loadSubPanelData('fund');
      }
    }
    window.retryFund = retryFund;

    function toggleNotifPanel() {
      const panel = document.getElementById('notifPanel');
      const isOpening = !panel.classList.contains('open');
      panel.classList.toggle('open');
      document.getElementById('notifOverlay').classList.toggle('show');
      if (isOpening) ensureNotifications();
    }

    function closeNotifPanel() {
      document.getElementById('notifPanel').classList.remove('open');
      document.getElementById('notifOverlay').classList.remove('show');
    }
  </script>
</body>
</html>
