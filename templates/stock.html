<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/static/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>{{ symbol }} - StockAI Pro</title>
  <link rel="stylesheet" href="/static/style.css?v=42">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="stock-page">

  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="stock-back" aria-label="ホームへ">←</a>
        <div class="stock-header-titles">
          <span class="stock-header-symbol" id="headerSymbol">{{ symbol }}</span>
          <span class="stock-header-name" id="headerName">読み込み中...</span>
        </div>
      </div>
      <span class="live-sync stock-live-sync" id="stockLiveSync" aria-live="polite"></span>
      <span class="stock-live-badge" id="stockLiveBadge" hidden>
        <span class="stock-live-dot"></span>LIVE
      </span>
    </div>
  </header>

  <div class="global-progress" id="globalProgress" aria-hidden="true"><div class="global-progress-bar"></div></div>

  <main class="stock-main fade-in">
    <section class="stock-price-card card-premium" id="priceCard">
      <div class="skeleton-line skeleton-lg"></div>
      <div class="skeleton-line skeleton-sm"></div>
    </section>

    <section class="pts-card card-premium" id="ptsCard">
      <div class="pts-label">🌙 PTS・時間外</div>
      <div class="pts-body" id="ptsBody">
        <span class="skeleton-line skeleton-sm"></span>
      </div>
    </section>

    <section class="stock-stats" id="stockStats" style="display: none;"></section>

    <!-- chart-period-ui-v39: 5分/15分/1日/1週/1ヶ月/6ヶ月/1年（7タブ固定） -->
    <div class="chart-period-tabs" id="periodTabs" data-period-ui="v39" role="tablist" aria-label="チャート期間">
      <button type="button" class="period-btn" data-period="5m" role="tab" aria-selected="false">5分</button>
      <button type="button" class="period-btn" data-period="15m" role="tab" aria-selected="false">15分</button>
      <button type="button" class="period-btn" data-period="1D" role="tab" aria-selected="false">1日</button>
      <button type="button" class="period-btn" data-period="1w" role="tab" aria-selected="false">1週</button>
      <button type="button" class="period-btn" data-period="1M" role="tab" aria-selected="false">1ヶ月</button>
      <button type="button" class="period-btn" data-period="6M" role="tab" aria-selected="false">6ヶ月</button>
      <button type="button" class="period-btn" data-period="1Y" role="tab" aria-selected="false">1年</button>
    </div>

    <section class="stock-chart-wrap card-premium">
      <div class="chart-overlay-toggles" id="chartToggles">
        <label class="chart-toggle"><input type="checkbox" data-layer="ma5"> MA5</label>
        <label class="chart-toggle is-on"><input type="checkbox" data-layer="ma25" checked> MA25</label>
        <label class="chart-toggle"><input type="checkbox" data-layer="ma75"> MA75</label>
        <label class="chart-toggle"><input type="checkbox" data-layer="bb"> ボリンジャー</label>
      </div>
      <div id="chartContainer" class="stock-chart-container"></div>
      <div class="chart-loading" id="chartLoading">チャート読み込み中...</div>
      <div class="chart-error" id="chartError" style="display: none;"></div>
    </section>

    <section class="section-block trade-simulator-section">
      <h2 class="section-title">📊 売買シミュレーター</h2>
      <div class="trade-simulator-card card-premium" id="tradeSimulatorHost">
        <div id="tradeSimulator"></div>
      </div>
    </section>

    <nav class="stock-subtabs" id="stockSubtabs">
      <button type="button" class="stock-subtab active" data-subtab="technical">テクニカル</button>
      <button type="button" class="stock-subtab" data-subtab="supply">需給/信用</button>
      <button type="button" class="stock-subtab" data-subtab="orderbook">気配</button>
    </nav>

    <div class="stock-subpanel active" id="subpanel-technical">
    <section class="section-block">
      <h2 class="section-title">📐 テクニカル分析 <span class="tech-period-badge" id="techPeriodBadge">1日</span></h2>
      <div class="tech-panel card-premium" id="techPanel">
        <div class="skeleton-block"></div>
      </div>
    </section>
    </div>

    <div class="stock-subpanel" id="subpanel-supply" hidden>
      <section class="section-block">
        <h2 class="section-title">📊 需給 / 信用</h2>
        <div class="supply-panel card-premium" id="supplyPanel">
          <div class="skeleton-block"></div>
        </div>
      </section>
    </div>

    <div class="stock-subpanel" id="subpanel-orderbook" hidden>
      <section class="section-block">
        <h2 class="section-title">📋 気配値</h2>
        <div class="orderbook-panel card-premium" id="orderbookPanel">
          <div class="skeleton-block"></div>
        </div>
      </section>
    </div>

    <section class="section-block">
      <h2 class="section-title">🏭 セクター比較</h2>
      <div class="sector-panel card-premium" id="sectorPanel">
        <div class="skeleton-block"></div>
      </div>
    </section>

    <section class="section-block">
      <h2 class="section-title">🤖 AI分析</h2>
      <div class="ai-card-panel card-premium" id="aiCardPanel">
        <div class="skeleton-block"></div>
      </div>
    </section>

    <section class="section-block">
      <h2 class="section-title">🏦 ファンド・大量保有</h2>
      <div class="holdings-panel card-premium" id="holdingsPanel">
        <div class="skeleton-block"></div>
      </div>
    </section>

    <section class="section-block">
      <h2 class="section-title">📰 ニュース・材料</h2>
      <div class="news-list card-premium" id="newsList">
        <div class="skeleton-block"></div>
      </div>
    </section>
  </main>

  <script src="/static/script.js?v=42"></script>
  <script src="/static/stock-chart-periods.js?v=42"></script>
  <script src="/static/stock-simulator.js?v=42"></script>
<script>
    const SYMBOL = {{ symbol|tojson }};
    const MA_COLORS = {
      ma5: '#2962FF', ma25: '#FDD835', ma75: '#AB47BC',
      bb_upper: '#90a4ae', bb_lower: '#90a4ae',
    };

    let chartInstance = null;
    let candleSeries = null;
    let lineSeriesList = [];
    let lastChartJson = null;
    const PERIOD_LABELS = window.CHART_PERIOD_LABELS || {};
    const CHART_PERIOD_STORAGE_KEY = 'stockai_chart_period_v3';

    function isIntradayPeriod(period) {
      return window.isIntradayChartPeriod ? window.isIntradayChartPeriod(period) : (period === '5m' || period === '15m');
    }

    function isJapanMarketOpen(now = new Date()) {
      const jstStr = now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' });
      const jst = new Date(jstStr);
      const day = jst.getDay();
      if (day === 0 || day === 6) return false;
      const mins = jst.getHours() * 60 + jst.getMinutes();
      return (mins >= 540 && mins < 690) || (mins >= 750 && mins < 900);
    }

    function getDefaultChartPeriod() {
      const saved = localStorage.getItem(CHART_PERIOD_STORAGE_KEY)
        || localStorage.getItem('stockai_chart_period_v2')
        || localStorage.getItem('stockai_chart_period');
      const migrated = window.migrateChartPeriod ? window.migrateChartPeriod(saved) : saved;
      if (migrated && PERIOD_LABELS[migrated]) return migrated;
      return isJapanMarketOpen() ? '15m' : '1D';
    }

    function onPeriodSelect(period) {
      if (period === currentPeriod) return;
      currentPeriod = period;
      localStorage.setItem(CHART_PERIOD_STORAGE_KEY, currentPeriod);
      setActivePeriodTab(currentPeriod);
      loadChart(currentPeriod);
    }

    function bindChartPeriodTabs() {
      const host = document.getElementById('periodTabs');
      if (!host) return;
      if (window.ensureChartPeriodTabs) {
        window.ensureChartPeriodTabs(host);
      } else if (
        host.querySelector('[data-period="1mo"], [data-period="3mo"], [data-period="1y"]')
        || !host.querySelector('[data-period="5m"]')
      ) {
        host.dataset.periodUi = 'v39';
        host.innerHTML =
          '<button type="button" class="period-btn" data-period="5m" role="tab">5分</button>' +
          '<button type="button" class="period-btn" data-period="15m" role="tab">15分</button>' +
          '<button type="button" class="period-btn" data-period="1D" role="tab">1日</button>' +
          '<button type="button" class="period-btn" data-period="1w" role="tab">1週</button>' +
          '<button type="button" class="period-btn" data-period="1M" role="tab">1ヶ月</button>' +
          '<button type="button" class="period-btn" data-period="6M" role="tab">6ヶ月</button>' +
          '<button type="button" class="period-btn" data-period="1Y" role="tab">1年</button>';
      }
      host.querySelectorAll('.period-btn').forEach((btn) => {
        btn.addEventListener('click', () => onPeriodSelect(btn.dataset.period));
      });
    }

    function setActivePeriodTab(period) {
      document.querySelectorAll('.period-btn').forEach((btn) => {
        const active = btn.dataset.period === period;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      const activeBtn = document.querySelector(`.period-btn[data-period="${period}"]`);
      activeBtn?.scrollIntoView({ inline: 'nearest', block: 'nearest', behavior: 'smooth' });
    }

    let currentPeriod = getDefaultChartPeriod();
    const chartLayers = { ma5: false, ma25: true, ma75: false, bb: false };
    const subpanelLoaded = { supply: false, orderbook: false };
    let activeStockSubtab = 'technical';
    let lastStockPrice = null;
    const STOCK_FAST_MS = (window.REFRESH_MS && window.REFRESH_MS.STOCK_FAST) || 4000;
    const STOCK_SLOW_MS = (window.REFRESH_MS && window.REFRESH_MS.STOCK_SLOW) || 12000;

    function chartHeight() {
      const vh = window.innerHeight;
      if (vh < 700) return Math.max(360, Math.min(480, vh * 0.52));
      return Math.max(380, Math.min(560, vh * 0.48));
    }

    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

      bindChartPeriodTabs();
      setActivePeriodTab(currentPeriod);

      document.querySelectorAll('#chartToggles input[data-layer]').forEach((input) => {
        input.addEventListener('change', () => {
          const layer = input.dataset.layer;
          chartLayers[layer] = input.checked;
          input.closest('.chart-toggle')?.classList.toggle('is-on', input.checked);
          applyChartLayers();
        });
      });

      document.querySelectorAll('.stock-subtab').forEach((btn) => {
        btn.addEventListener('click', () => switchStockSubtab(btn.dataset.subtab));
      });

      if (window.StockSimulator) StockSimulator.mount(SYMBOL);

      loadStock();
      loadChart(currentPeriod);
      loadAiCard();
      loadHoldings();
      loadSector();
      loadNews();
      window.addEventListener('resize', resizeChart);
      initStockAutoRefresh();
      updateStockLiveBadge(true);
    });

    function initStockAutoRefresh() {
      if (!window.createPageAutoRefresh) return;
      window._stockFastRefresh = createPageAutoRefresh({
        intervalMs: STOCK_FAST_MS,
        onRefresh: () => refreshStockFast(),
      });
      window._stockSlowRefresh = createPageAutoRefresh({
        intervalMs: STOCK_SLOW_MS,
        onRefresh: () => refreshStockSlow(),
      });
      window._stockFastRefresh.start();
      window._stockSlowRefresh.start();
    }

    /** 株価・PTS・気配・需給 — 3〜5秒（最優先） */
    async function refreshStockFast() {
      if (document.hidden) return;
      pulseLiveSync('stockLiveSync');

      const tasks = [loadStock({ silent: true })];
      if (activeStockSubtab === 'orderbook' || subpanelLoaded.orderbook) {
        tasks.push(loadOrderbook({ silent: true }));
      }
      if (activeStockSubtab === 'supply' || subpanelLoaded.supply) {
        tasks.push(loadSupply({ silent: true }));
      }

      await Promise.allSettled(tasks);
      setLiveSyncStatus('stockLiveSync', formatLiveTime());
      updateStockLiveBadge(true);
    }

    /** チャート・AI・ニュース等 — 10〜15秒 */
    async function refreshStockSlow() {
      if (document.hidden) return;
      await Promise.allSettled([
        loadChart(currentPeriod, { silent: true }),
        loadAiCard({ silent: true }),
        loadHoldings({ silent: true }),
        loadSector({ silent: true }),
        loadNews({ silent: true }),
      ]);
    }

    function updateStockLiveBadge(active) {
      const badge = document.getElementById('stockLiveBadge');
      if (!badge) return;
      badge.hidden = false;
      badge.classList.toggle('is-active', !!active);
    }

    function switchStockSubtab(name) {
      activeStockSubtab = name;
      document.querySelectorAll('.stock-subtab').forEach((b) => {
        b.classList.toggle('active', b.dataset.subtab === name);
      });
      document.querySelectorAll('.stock-subpanel').forEach((p) => {
        const on = p.id === `subpanel-${name}`;
        p.classList.toggle('active', on);
        p.hidden = !on;
      });
      if (name === 'supply' && !subpanelLoaded.supply) loadSupply();
      else if (name === 'supply') window._stockFastRefresh?.refreshNow();
      if (name === 'orderbook' && !subpanelLoaded.orderbook) loadOrderbook();
      else if (name === 'orderbook') window._stockFastRefresh?.refreshNow();
    }

    function fmtPrice(n) {
      if (n == null || Number.isNaN(n)) return '—';
      return '¥' + Number(n).toLocaleString('ja-JP', { maximumFractionDigits: 2 });
    }

    function fmtNum(n, digits = 2) {
      if (n == null || Number.isNaN(n)) return '—';
      return Number(n).toLocaleString('ja-JP', { maximumFractionDigits: digits });
    }

    function renderPts(d, opts = {}) {
      const body = document.getElementById('ptsBody');
      const price = d.pts_price;
      const pct = d.pts_change_pct;

      if (price == null) {
        if (!opts.silent || !body.querySelector('.pts-price')) {
          body.innerHTML = '<span class="pts-na">PTS価格: N/A</span><span class="pts-na">PTS前日比: N/A</span>';
        }
        return;
      }

      const up = pct != null ? pct >= 0 : true;
      const cls = pct != null ? (up ? 'up' : 'down') : 'neutral';
      const pctStr = pct != null ? `${up ? '+' : ''}${pct.toFixed(2)}%` : 'N/A';

      if (opts.silent && body.querySelector('.pts-price')) {
        body.querySelector('.pts-price').textContent = fmtPrice(price);
        const chgEl = body.querySelector('.pts-chg');
        if (chgEl) {
          chgEl.className = `pts-chg ${cls}`;
          chgEl.innerHTML = `PTS前日比: ${pctStr}`;
        }
        return;
      }

      body.innerHTML = `
        <div class="pts-price">${fmtPrice(price)}</div>
        <div class="pts-chg ${cls}">
          PTS前日比:
          ${pctStr}
        </div>
      `;
    }

    function renderTechnical(t, opts = {}) {
      const panel = document.getElementById('techPanel');
      if (!t || (t.rsi == null && t.macd == null)) {
        if (!opts.silent) {
          panel.innerHTML = '<div class="news-empty">テクニカルデータがありません</div>';
        }
        return;
      }

      if (opts.silent && panel.querySelector('.tech-grid')) {
        const set = (key, val) => {
          const el = panel.querySelector(`[data-tech="${key}"]`);
          if (el) el.textContent = val ?? '—';
        };
        set('rsi', t.rsi);
        set('rsi_judge', t.rsi_judge);
        set('macd', t.macd);
        set('macd_judge', t.macd_judge);
        set('macd_signal', t.macd_signal);
        set('bb_upper', t.bb_upper);
        set('bb_mid', t.bb_mid);
        set('bb_lower', t.bb_lower);
        set('bb_judge', t.bb_judge);
        return;
      }

      panel.innerHTML = `
        <div class="tech-grid">
          <div class="tech-item">
            <div class="tech-label">RSI(14)</div>
            <div class="tech-val" data-tech="rsi">${t.rsi ?? '—'}</div>
            <div class="tech-judge" data-tech="rsi_judge">${escapeHtml(t.rsi_judge)}</div>
          </div>
          <div class="tech-item">
            <div class="tech-label">MACD</div>
            <div class="tech-val" data-tech="macd">${t.macd ?? '—'}</div>
            <div class="tech-judge" data-tech="macd_judge">${escapeHtml(t.macd_judge)}</div>
          </div>
          <div class="tech-item">
            <div class="tech-label">MACDシグナル</div>
            <div class="tech-val" data-tech="macd_signal">${t.macd_signal ?? '—'}</div>
            <div class="tech-judge">—</div>
          </div>
          <div class="tech-item tech-item-wide">
            <div class="tech-label">ボリンジャーバンド(20)</div>
            <div class="tech-val bb-row">上 <span data-tech="bb_upper">${t.bb_upper ?? '—'}</span> / 中 <span data-tech="bb_mid">${t.bb_mid ?? '—'}</span> / 下 <span data-tech="bb_lower">${t.bb_lower ?? '—'}</span></div>
            <div class="tech-judge" data-tech="bb_judge">${escapeHtml(t.bb_judge)}</div>
          </div>
        </div>
      `;
    }

    async function loadHoldings(opts = {}) {
      const isRetry = !!opts.isRetry;
      const panel = document.getElementById('holdingsPanel');
      try {
        const res = isRetry ? await fetchSilent(`/api/holdings?symbol=${encodeURIComponent(SYMBOL)}`) : await fetchWithProgress(`/api/holdings?symbol=${encodeURIComponent(SYMBOL)}`);
        const json = await res.json();
        if (!json.has_data || !json.items?.length) {
          panel.innerHTML = '<div class="news-empty">現在データなし</div>';
          resetAutoRetry('holdings');
          return true;
        }
        panel.innerHTML = json.items.map((h) => `
          <div class="holding-row">
            <div class="holding-top">
              <span class="holding-type">${escapeHtml(h.type)}</span>
              <span class="holding-date">${escapeHtml(h.updated)}</span>
            </div>
            <div class="holding-name">${escapeHtml(h.name)}</div>
            <div class="holding-meta">
              <span>保有比率: ${escapeHtml(h.ratio)}</span>
              <span>目的: ${escapeHtml(h.purpose)}</span>
            </div>
          </div>
        `).join('');
        resetAutoRetry('holdings');
        return true;
      } catch (e) {
        scheduleAutoRetry('holdings', () => loadHoldings({ isRetry: true }), { containerEl: panel });
        return false;
      }
    }

    async function loadSector(opts = {}) {
      const isRetry = !!opts.isRetry;
      const panel = document.getElementById('sectorPanel');
      try {
        const res = isRetry ? await fetchSilent(`/api/sector?symbol=${encodeURIComponent(SYMBOL)}`) : await fetchWithProgress(`/api/sector?symbol=${encodeURIComponent(SYMBOL)}`);
        const json = await res.json();
        const s = json.sector;
        if (!s) {
          panel.innerHTML = '<div class="news-empty">現在データなし</div>';
          resetAutoRetry('sector');
          return true;
        }
        panel.innerHTML = `
          <div class="sector-grid">
            <div class="sector-item"><span class="sector-k">セクター</span><span class="sector-v">${escapeHtml(s.sector)}</span></div>
            <div class="sector-item"><span class="sector-k">業種</span><span class="sector-v">${escapeHtml(s.industry || '—')}</span></div>
            <div class="sector-item"><span class="sector-k">同業平均PER</span><span class="sector-v">${s.sector_per_avg}</span></div>
            <div class="sector-item"><span class="sector-k">同業平均PBR</span><span class="sector-v">${s.sector_pbr_avg}</span></div>
            <div class="sector-item"><span class="sector-k">PER位置</span><span class="sector-v highlight">${escapeHtml(s.per_position)}</span></div>
            <div class="sector-item"><span class="sector-k">PBR位置</span><span class="sector-v highlight">${escapeHtml(s.pbr_position)}</span></div>
          </div>
        `;
        resetAutoRetry('sector');
        return true;
      } catch (e) {
        scheduleAutoRetry('sector', () => loadSector({ isRetry: true }), { containerEl: panel });
        return false;
      }
    }

    let lastStockData = null;

    function applyStockData(d, opts = {}) {
      lastStockData = d;
      const silent = !!opts.silent;
      document.title = `${d.symbol} ${d.name} - StockAI Pro`;
      document.getElementById('headerSymbol').textContent = d.symbol;
      document.getElementById('headerName').textContent = d.name || '';
      renderPts(d, opts);

      const up = (d.change_pct ?? 0) >= 0;
      const chgClass = up ? 'up' : 'down';
      const arrow = up ? '▲' : '▼';
      const card = document.getElementById('priceCard');
      const priceStr = fmtPrice(d.current);

      if (silent && card.querySelector('.stock-current')) {
        const priceEl = card.querySelector('.stock-current');
        if (priceEl.textContent !== priceStr) {
          priceEl.textContent = priceStr;
          if (d.current != null && lastStockPrice != null && d.current !== lastStockPrice) {
            flashPriceElement(priceEl, d.current > lastStockPrice ? 'up' : 'down');
          }
        }
        lastStockPrice = d.current;
        const chgEl = card.querySelector('.stock-change');
        if (chgEl) {
          chgEl.className = `stock-change ${chgClass}`;
          chgEl.innerHTML = `<span>${arrow} ${fmtNum(Math.abs(d.change ?? 0))}</span><span class="stock-change-pct">(${d.change_pct != null ? (up ? '+' : '') + d.change_pct.toFixed(2) : '—'}%)</span>`;
        }
        const sub = card.querySelector('.stock-price-sub');
        if (sub) {
          sub.innerHTML = `<span>始値 ${fmtPrice(d.open)}</span><span>高値 ${fmtPrice(d.high)}</span><span>安値 ${fmtPrice(d.low)}</span>`;
        }
      } else {
        lastStockPrice = d.current;
        card.innerHTML = `
          <div class="stock-price-main">
            <div class="stock-current">${priceStr}</div>
            <div class="stock-change ${chgClass}">
              <span>${arrow} ${fmtNum(Math.abs(d.change ?? 0))}</span>
              <span class="stock-change-pct">(${d.change_pct != null ? (up ? '+' : '') + d.change_pct.toFixed(2) : '—'}%)</span>
            </div>
          </div>
          <div class="stock-price-sub">
            <span>始値 ${fmtPrice(d.open)}</span>
            <span>高値 ${fmtPrice(d.high)}</span>
            <span>安値 ${fmtPrice(d.low)}</span>
          </div>
        `;
      }

      const stats = document.getElementById('stockStats');
      stats.style.display = 'grid';
      const statMap = {
        market_cap: d.market_cap_fmt || '—',
        per: fmtNum(d.per),
        pbr: fmtNum(d.pbr),
        dividend: d.dividend_yield != null ? d.dividend_yield.toFixed(2) + '%' : '—',
        volume: d.volume != null ? fmtNum(d.volume, 0) : '—',
        range52: `${fmtPrice(d['52w_low'])} – ${fmtPrice(d['52w_high'])}`,
      };

      if (silent && stats.querySelector('[data-stat]')) {
        Object.entries(statMap).forEach(([key, val]) => {
          const el = stats.querySelector(`[data-stat="${key}"]`);
          if (el) el.textContent = val;
        });
      } else {
        stats.innerHTML = `
          <div class="stat-item card-premium"><span class="stat-label">時価総額</span><span class="stat-val" data-stat="market_cap">${escapeHtml(String(statMap.market_cap))}</span></div>
          <div class="stat-item card-premium"><span class="stat-label">PER</span><span class="stat-val" data-stat="per">${statMap.per}</span></div>
          <div class="stat-item card-premium"><span class="stat-label">PBR</span><span class="stat-val" data-stat="pbr">${statMap.pbr}</span></div>
          <div class="stat-item card-premium"><span class="stat-label">配当利回り</span><span class="stat-val" data-stat="dividend">${statMap.dividend}</span></div>
          <div class="stat-item card-premium"><span class="stat-label">出来高</span><span class="stat-val" data-stat="volume">${statMap.volume}</span></div>
          <div class="stat-item card-premium"><span class="stat-label">52週</span><span class="stat-val" data-stat="range52">${statMap.range52}</span></div>
        `;
      }

      if (!silent) {
        setLiveSyncStatus('stockLiveSync', formatLiveTime());
      }

      if (window.StockSimulator && d.current != null) {
        StockSimulator.setCurrentPrice(d.current);
      }
    }

    async function loadStock(opts = {}) {
      const silent = !!opts.silent;
      const isRetry = !!opts.isRetry;
      const card = document.getElementById('priceCard');
      try {
        const res = silent || isRetry
          ? await fetchSilent(`/api/stock?symbol=${encodeURIComponent(SYMBOL)}`)
          : await fetchWithProgress(`/api/stock?symbol=${encodeURIComponent(SYMBOL)}`);
        const json = await res.json();
        if (json.status !== 'ok' || !json.data) {
          scheduleAutoRetry(
            'stock',
            () => loadStock({ isRetry: true, silent }),
            { containerEl: silent ? null : card, silent: !!silent }
          );
          return false;
        }
        applyStockData(json.data, opts);
        resetAutoRetry('stock');
        return true;
      } catch (e) {
        console.error(e);
        if (silent && lastStockData) {
          pulseLiveSync('stockLiveSync');
          scheduleAutoRetry(
            'stock',
            () => loadStock({ isRetry: true, silent: true }),
            { silent: true }
          );
          return false;
        }
        scheduleAutoRetry(
          'stock',
          () => loadStock({ isRetry: true, silent }),
          { containerEl: silent ? null : card, silent: !!silent }
        );
        return false;
      }
    }

    function fmtBoardPrice(n) {
      if (n == null || Number.isNaN(n)) return '—';
      return Number(n).toLocaleString('ja-JP', { maximumFractionDigits: 2 });
    }

    function renderOrderbookPanel(b, panel) {
      const sells = (b.sells || b.levels || []).filter((l) => l.side === 'sell').sort((a, c) => c.price - a.price);
      const buys = (b.buys || b.levels || []).filter((l) => l.side === 'buy').sort((a, c) => c.price - a.price);

      const sellRow = (l) => `
        <div class="ob-row ob-row-sell">
          <span class="ob-col-qty ob-col-qty-sell">${fmtNum(l.qty, 0)}</span>
          <span class="ob-col-price ask">${fmtBoardPrice(l.price)}</span>
          <span class="ob-col-qty ob-col-qty-buy"></span>
        </div>`;

      const buyRow = (l) => `
        <div class="ob-row ob-row-buy">
          <span class="ob-col-qty ob-col-qty-sell"></span>
          <span class="ob-col-price bid">${fmtBoardPrice(l.price)}</span>
          <span class="ob-col-qty ob-col-qty-buy">${fmtNum(l.qty, 0)}</span>
        </div>`;

      panel.innerHTML = `
        <div class="ob-source">${escapeHtml(b.source || '')}</div>
        <div class="ob-best-row">
          <div class="ob-best-item"><span class="ob-k">Best Bid</span><span class="ob-v bid">${fmtBoardPrice(b.bid)}</span><span class="ob-q">${b.bid_size != null ? fmtNum(b.bid_size, 0) + '株' : '—'}</span></div>
          <div class="ob-spread"><span class="ob-k">Spread</span><span class="ob-v">${b.spread != null ? fmtBoardPrice(b.spread) : '—'}</span><span class="ob-sub">${b.spread_pct != null ? b.spread_pct + '%' : ''}</span></div>
          <div class="ob-best-item"><span class="ob-k">Best Ask</span><span class="ob-v ask">${fmtBoardPrice(b.ask)}</span><span class="ob-q">${b.ask_size != null ? fmtNum(b.ask_size, 0) + '株' : '—'}</span></div>
        </div>
        <div class="ob-summary">
          <div class="ob-summary-item">
            <span class="ob-summary-k">売り総量</span>
            <span class="ob-summary-v sell">${b.total_sell_qty != null ? fmtNum(b.total_sell_qty, 0) : '—'}</span>
          </div>
          <div class="ob-summary-item">
            <span class="ob-summary-k">成行</span>
            <span class="ob-summary-v ob-summary-market">
              <span class="sell">${b.market_sell_qty != null ? fmtNum(b.market_sell_qty, 0) : '—'}</span>
              <span class="ob-summary-sep">/</span>
              <span class="buy">${b.market_buy_qty != null ? fmtNum(b.market_buy_qty, 0) : '—'}</span>
            </span>
          </div>
          <div class="ob-summary-item">
            <span class="ob-summary-k">買い総量</span>
            <span class="ob-summary-v buy">${b.total_buy_qty != null ? fmtNum(b.total_buy_qty, 0) : '—'}</span>
          </div>
        </div>
        <div class="ob-board">
          <div class="ob-board-head">
            <span>売数量</span>
            <span>価格</span>
            <span>買数量</span>
          </div>
          <div class="ob-row ob-row-over">
            <span class="ob-col-qty ob-col-qty-sell">${b.over_qty != null ? fmtNum(b.over_qty, 0) : '—'}</span>
            <span class="ob-col-price ask">OVER</span>
            <span class="ob-col-qty ob-col-qty-buy"></span>
          </div>
          ${sells.map(sellRow).join('')}
          <div class="ob-row ob-row-mid">
            <span class="ob-col-mid">現在 ${fmtBoardPrice(b.current)}</span>
          </div>
          ${buys.map(buyRow).join('')}
          <div class="ob-row ob-row-under">
            <span class="ob-col-qty ob-col-qty-sell"></span>
            <span class="ob-col-price bid">UNDER</span>
            <span class="ob-col-qty ob-col-qty-buy">${b.under_qty != null ? fmtNum(b.under_qty, 0) : '—'}</span>

        </div>
      `;

    async function loadNews(opts = {}) {
      const isRetry = !!opts.isRetry;
      const list = document.getElementById('newsList');
      try {
        const res = isRetry ? await fetchSilent(`/api/news?symbol=${encodeURIComponent(SYMBOL)}`) : await fetchWithProgress(`/api/news?symbol=${encodeURIComponent(SYMBOL)}`);
        const json = await res.json();
        if (json.status !== 'ok' || !json.news || json.news.length === 0) {
          list.innerHTML = '<div class="news-empty">ニュースがありません</div>';
          resetAutoRetry('news');
          return true;
        }
        list.innerHTML = json.news.map((n) => `
          <a class="news-item" href="${escapeHtml(n.url)}" target="_blank" rel="noopener noreferrer">
            <div class="news-title">${escapeHtml(n.title)}</div>

    function getChartOptions(width, height, period) {
      const intraday = isIntradayPeriod(period);
      return {
        width,
        height,
        layout: { background: { color: '#121829' }, textColor: '#8b95a8' },
        grid: {
          vertLines: { color: 'rgba(255,255,255,0.06)' },
          horzLines: { color: 'rgba(255,255,255,0.06)' },
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: {
          visible: true,
          borderColor: 'rgba(255,255,255,0.08)',
          scaleMargins: { top: 0.06, bottom: 0.06 },
        },
        leftPriceScale: { visible: false },
        timeScale: {
          borderColor: 'rgba(255,255,255,0.08)',
          timeVisible: true,
          secondsVisible: intraday,
        },
      };
    }

    function toChartTime(unixSec, period) {
      if (isIntradayPeriod(period)) return unixSec;
      const d = new Date(unixSec * 1000);
      return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`;
    }

    function mapCandles(candles, period) {
      return candles.map((c) => ({
        time: toChartTime(c.time, period),
        open: c.open,
        high: c.high,
        low: c.low,
        close: c.close,
      }));
    }

    function mapLine(points, period) {
      if (!points) return [];
      return points.map((p) => ({
        time: toChartTime(p.time, period),
        value: p.value,
      }));
    }

    function destroyChart() {
      lineSeriesList = [];
      if (chartInstance) {
        chartInstance.remove();
        chartInstance = null;
        candleSeries = null;
      }
    }

    function resizeChart() {
      if (!chartInstance) return;
      const container = document.getElementById('chartContainer');
      const w = container.clientWidth;
      chartInstance.applyOptions({
        width: w,
        height: chartHeight(),
      });
      if (lastChartJson) {
        applyChartViewportFromJson(lastChartJson, currentPeriod, w);
      }
    }

    function clearLineSeries() {
      lineSeriesList.forEach((s) => {
        try { chartInstance.removeSeries(s); } catch (_) {}
      });
      lineSeriesList = [];
    }

    function addMaLine(indicators, key, period) {
      const data = mapLine(indicators[key], period);
      if (!data.length) return;
      const series = chartInstance.addSeries(LightweightCharts.LineSeries, {
        color: MA_COLORS[key] || MA_COLORS.ma25,
        lineWidth: key.startsWith('bb') ? 1 : 2,
        priceScaleId: 'right',
        lastValueVisible: false,
        priceLineVisible: false,
      });
      series.setData(data);
      lineSeriesList.push(series);
    }

    function applyChartLayers() {
      if (!chartInstance || !lastChartJson) return;
      clearLineSeries();
      const ind = lastChartJson.indicators || {};
      const period = lastChartJson.period || currentPeriod;
      if (chartLayers.ma5) addMaLine(ind, 'ma5', period);
      if (chartLayers.ma25) addMaLine(ind, 'ma25', period);
      if (chartLayers.ma75) addMaLine(ind, 'ma75', period);
      if (chartLayers.bb) {
        addMaLine(ind, 'bb_upper', period);
        addMaLine(ind, 'bb_lower', period);
      }
    }

    function applyChartDataSilent(json, period) {
      const candles = mapCandles(json.candles, period);
      if (!candles.length) return;

      const prevLen = lastChartJson?.candles?.length || 0;
      const newLen = candles.length;

      if (newLen === prevLen || newLen === prevLen + 1) {
        candleSeries.update(candles[newLen - 1]);
      } else {
        candleSeries.setData(candles);
        try {
          chartInstance.timeScale().scrollToRealTime();
        } catch (_) {
          /* ignore */
        }
      }
    }

    function applyChartViewportFromJson(json, period, containerWidth) {
      const candles = json.candles || [];
      if (!chartInstance || !candles.length || !window.applyChartViewport) return;
      window.applyChartViewport(chartInstance, candles.length, {
        width: containerWidth,
        visibleBars: json.visible_bars || json.baseline_bars || window.CHART_BASELINE_BARS,
        intraday: isIntradayPeriod(period),
      });
    }

    async function loadChart(period, opts = {}) {
      const silent = !!opts.silent;
      const isRetry = !!opts.isRetry;
      const loading = document.getElementById('chartLoading');
      const errEl = document.getElementById('chartError');
      document.getElementById('techPeriodBadge').textContent = PERIOD_LABELS[period] || period;
      if (!silent && !isRetry) {
        loading.style.display = 'block';
        errEl.style.display = 'none';
      }

      try {
        const url = `/api/chart?symbol=${encodeURIComponent(SYMBOL)}&period=${encodeURIComponent(period)}`;
        const res = silent ? await fetchSilent(url) : await fetchWithProgress(url);
        const json = await res.json();

        if (json.status !== 'ok' || !json.candles || json.candles.length === 0) {
          if (!silent) {
            loading.style.display = 'none';
            errEl.style.display = 'block';
            showConnRetryHint(errEl);
            destroyChart();
            scheduleAutoRetry('chart', () => loadChart(period, { isRetry: true }), { containerEl: errEl });
          }
          return false;
        }

        if (silent && chartInstance && candleSeries && period === currentPeriod) {
          loading.style.display = 'none';
          applyChartDataSilent(json, period);
          lastChartJson = { ...json, period };
          applyChartLayers();
          renderTechnical(json.technical, { silent: true });
          return true;
        }

        loading.style.display = 'none';
        destroyChart();

        const container = document.getElementById('chartContainer');
        const w = container.clientWidth || container.parentElement.clientWidth;
        const h = chartHeight();

        chartInstance = LightweightCharts.createChart(container, getChartOptions(w, h, period));

        candleSeries = chartInstance.addSeries(LightweightCharts.CandlestickSeries, {
          priceScaleId: 'right',
          upColor: '#26a69a',
          downColor: '#ef5350',
          borderVisible: true,
          borderUpColor: '#26a69a',
          borderDownColor: '#ef5350',
          wickUpColor: '#26a69a',
          wickDownColor: '#ef5350',
        });
        const mapped = mapCandles(json.candles, period);
        candleSeries.setData(mapped);

        lastChartJson = { ...json, period };
        applyChartLayers();

        renderTechnical(json.technical);

        chartInstance.priceScale('right').applyOptions({
          autoScale: true,
          scaleMargins: { top: 0.06, bottom: 0.06 },
        });
        applyChartViewportFromJson(json, period, w);
        errEl.style.display = 'none';
        resetAutoRetry('chart');
        return true;
      } catch (e) {
        console.error(e);
        if (!silent) {
          loading.style.display = 'none';
          errEl.style.display = 'block';
          scheduleAutoRetry('chart', () => loadChart(period, { isRetry: true }), { containerEl: errEl });
        }
        return false;
      }
    }
</script>
