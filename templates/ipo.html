<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/static/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>IPO・PO - StockAI Pro</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="ipo-page fade-in">
  <header class="app-header ipo-app-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="stock-back" aria-label="ホームへ">←</a>
      </div>
    </div>
  </header>

  <div class="global-progress" id="globalProgress" aria-hidden="true"><div class="global-progress-bar"></div></div>

  <main class="ipo-main">
    <div class="ipo-page-head">
      <div class="ipo-page-head-left">
        <h1 class="ipo-page-title" id="ipoPageTitle">IPO・PO</h1>
        <p class="ipo-page-meta" id="ipoPageMeta">読み込み中…</p>
      </div>
      <div class="ipo-page-head-right">
        <label class="sr-only" for="ipoTypeSelect">表示切替</label>
        <select id="ipoTypeSelect" class="ipo-type-select" aria-label="IPO / PO 切替">
          <option value="ipo">IPO</option>
          <option value="po">PO</option>
        </select>
      </div>
    </div>

    <div class="ipo-segment" id="ipoSegment" role="tablist" aria-label="絞り込み">
      <button type="button" class="ipo-segment-btn active" data-filter="all" role="tab" aria-selected="true">すべて</button>
      <button type="button" class="ipo-segment-btn" data-filter="open" role="tab" aria-selected="false" id="ipoSegmentOpen">募集中</button>
      <button type="button" class="ipo-segment-btn" data-filter="closed" role="tab" aria-selected="false">終了</button>
    </div>

    <div class="ipo-panel active" id="ipoPanelIpo">
      <div class="ipo-list" id="ipoList"><div class="skeleton-list"><div class="skeleton-card-row"></div><div class="skeleton-card-row"></div></div></div>
    </div>

    <div class="ipo-panel" id="ipoPanelPo" hidden>
      <div class="ipo-list" id="poList"><div class="skeleton-list"><div class="skeleton-card-row"></div></div></div>
    </div>

    <p class="ipo-disclaimer">※ 参考データです。投資判断は公式情報をご確認ください。</p>
  </main>

  <nav class="bottom-nav bottom-nav-minimal bottom-nav-quad">
    <a href="/" class="bn-item"><span class="bn-icon">🏠</span><span class="bn-label">ホーム</span></a>
    <a href="/?tab=watchlist" class="bn-item"><span class="bn-icon">📋</span><span class="bn-label">登録銘柄</span></a>
    <a href="/?tab=ranking" class="bn-item"><span class="bn-icon">📊</span><span class="bn-label">急騰急落</span></a>
    <a href="/?tab=ipo" class="bn-item active"><span class="bn-icon">🆕</span><span class="bn-label">IPO</span></a>
  </nav>

  <script src="/static/script.js"></script>
  <script src="/static/ipo.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      IpoPage.init();
      Promise.all([IpoPage.loadIpoList(), IpoPage.loadPoList()]);
    });
  </script>
</body>
</html>
