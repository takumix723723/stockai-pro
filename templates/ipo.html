<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1c">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <title>IPO・PO - StockAI Pro</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="ipo-page fade-in">
  <header class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" class="stock-back" aria-label="ホームへ">←</a>
        <div class="stock-header-titles">
          <span class="stock-header-symbol">IPO・PO</span>
          <span class="stock-header-name" id="ipoMetaLabel">読み込み中…</span>
        </div>
      </div>
    </div>
  </header>

  <div class="global-progress" id="globalProgress" aria-hidden="true"><div class="global-progress-bar"></div></div>

  <main class="ipo-main">
    <nav class="ipo-subtabs">
      <button type="button" class="ipo-subtab active" data-ipo-tab="ipo">IPO（新規公開）</button>
      <button type="button" class="ipo-subtab" data-ipo-tab="po">PO（売出）</button>
    </nav>

    <div class="ipo-panel active" id="ipoPanelIpo">
      <div class="ipo-filter-row">
        <button type="button" class="ipo-filter active" data-filter="all">すべて</button>
        <button type="button" class="ipo-filter" data-filter="open">募集中</button>
        <button type="button" class="ipo-filter" data-filter="closed">終了</button>
      </div>
      <div class="ipo-list" id="ipoList"><div class="skeleton-list"><div class="skeleton-card-row"></div><div class="skeleton-card-row"></div></div></div>
    </div>

    <div class="ipo-panel" id="ipoPanelPo" hidden>
      <div class="ipo-filter-row">
        <button type="button" class="ipo-filter po-filter active" data-po-filter="all">すべて</button>
        <button type="button" class="ipo-filter po-filter" data-po-filter="open">受付中</button>
        <button type="button" class="ipo-filter po-filter" data-po-filter="closed">終了</button>
      </div>
      <div class="ipo-list" id="poList"><div class="skeleton-list"><div class="skeleton-card-row"></div></div></div>
    </div>

    <p class="ipo-disclaimer">※ 参考データです。投資判断は公式情報をご確認ください。</p>
  </main>

  <nav class="bottom-nav bottom-nav-minimal bottom-nav-quad">
    <a href="/" class="bn-item"><span class="bn-icon">🏠</span><span class="bn-label">ホーム</span></a>
    <a href="/?tab=watchlist" class="bn-item"><span class="bn-icon">📋</span><span class="bn-label">登録銘柄</span></a>
    <a href="/ipo" class="bn-item active"><span class="bn-icon">🆕</span><span class="bn-label">IPO</span></a>
    <a href="/?tab=ranking" class="bn-item"><span class="bn-icon">📊</span><span class="bn-label">急騰急落</span></a>
  </nav>

  <script src="/static/script.js"></script>
  <script src="/static/ipo.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      IpoPage.init();
    });
  </script>
</body>
</html>
